# Server Configuration
server.port=8080
spring.application.name=shop-be

# JPA Configuration
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 本地开发：通过环境变量注入（IDE Run Config 或项目根目录 .env，勿提交）
# 例如: DB_URL=jdbc:postgresql://<服务器IP>:5432/shop
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── Auth ──
auth.jwt.issuer=qz-shop-be
auth.jwt.secret=${AUTH_JWT_SECRET:please-change-me-this-is-a-32byte-default-secret!!}
auth.jwt.access-ttl=PT30M
auth.jwt.refresh-ttl=P14D
auth.jwt.bind-pending-ttl=PT5M

auth.staff.max-failed-attempts=5
auth.staff.lock-duration=PT15M

auth.sms.provider=mock
auth.sms.code-ttl=PT5M
auth.sms.resend-cooldown=PT1M
auth.sms.daily-limit=10

# Optional one-time administrator bootstrap. Supply both values together.
auth.bootstrap-admin.phone=${BOOTSTRAP_ADMIN_PHONE:}
auth.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
auth.bootstrap-admin.name=${BOOTSTRAP_ADMIN_NAME:系统管理员}
auth.bootstrap-admin.store-id=${BOOTSTRAP_ADMIN_STORE_ID:1}
